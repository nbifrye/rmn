name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.7'

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate coverage summary
        id: coverage
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}')
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          go tool cover -func=coverage.out > coverage-func.txt
          echo "### Coverage: $TOTAL" >> "$GITHUB_STEP_SUMMARY"
          cat coverage-func.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce 100% coverage
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          if [ "$(echo "$TOTAL < 100.0" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below 100% threshold"
            go tool cover -func=coverage.out | grep -v '100.0%' | grep -v 'total:'
            exit 1
          fi

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && steps.coverage.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const total = '${{ steps.coverage.outputs.total }}';
            const funcReport = fs.readFileSync('coverage-func.txt', 'utf8');
            const marker = '<!-- coverage-report -->';
            const body = [
              marker,
              '## Test Coverage Report',
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| **Total Coverage** | **${total}** |`,
              '',
              '<details><summary>Full function-level coverage</summary>',
              '',
              '```',
              funcReport.trim(),
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.body.includes('<!-- coverage-report -->')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
